spring.application.name=Spring_Automobile_cs
spring.datasource.url=jdbc:mysql://localhost:3306/vehicle_insurance_system
spring.datasource.username=root
spring.datasource.password=Suwasthi@2005

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
